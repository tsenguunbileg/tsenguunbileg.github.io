<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Татвар төлөгчийн мэдээлэл</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body data-theme="glass">
    <img id="glass-source-image" class="hidden-src" crossorigin="anonymous" alt="" />
    <canvas id="glass-canvas" class="glass-refraction-canvas"></canvas>

    <div class="corner-controls" aria-label="Тохиргоо">
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-pressed="true"
        aria-label="Загвар солих"
      >
        Glass
      </button>
      <button
        id="api-mode-toggle"
        class="api-mode-toggle"
        type="button"
        aria-pressed="false"
      >
        API: Proxy
      </button>
      <button
        id="background-button"
        class="background-button"
        type="button"
      >
        Background
      </button>
      <input
        id="background-input"
        type="file"
        accept="image/*"
        hidden
      />
    </div>

    <main class="app-shell">
      <section class="lookup-card" aria-labelledby="app-title">
        <header class="card-header">
          <span class="eyebrow">eBarimt / eTax</span>
          <h1 id="app-title">Татвар төлөгчийн мэдээлэл татах програм</h1>
        </header>

        <form id="taxpayer-lookup-form" class="lookup-form" role="search">
          <label class="field-label" for="taxpayer-input">
            Регистрийн дугаараа оруулна уу
          </label>
          <div class="input-row">
            <div class="glass-input">
              <svg
                aria-hidden="true"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
              >
                <path
                  d="M10.8 18.6a7.8 7.8 0 1 1 0-15.6 7.8 7.8 0 0 1 0 15.6Z"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="m16.6 16.6 4.4 4.4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              <input
                id="taxpayer-input"
                name="registrationNumber"
                type="text"
                required
                autocomplete="off"
                spellcheck="false"
                placeholder="Регистрийн дугаар"
              />
            </div>
            <button id="lookup-button" class="pill-white" type="submit">
              Хайх
            </button>
          </div>
        </form>

        <p id="lookup-status" class="status-message" role="status" aria-live="polite"></p>

        <section class="result-panel" aria-label="Татвар төлөгчийн үр дүн">
          <div class="identity-row">
            <div class="identity-copy">
              <span class="result-kicker">Олдсон мэдээлэл</span>
              <h2 id="taxpayer-name">Регистрийн дугаар оруулна уу</h2>
              <p id="taxpayer-tin">ТИН дугаар энд харагдана</p>
            </div>
            <button
              id="found-badge"
              class="result-badge neutral"
              type="button"
              disabled
            >
              Хүлээгдэж байна
            </button>
          </div>

          <div class="stats-grid">
            <article class="stat">
              <div id="vat-payer" class="num">-</div>
              <div class="lbl">НӨАТ төлөгч</div>
            </article>
            <article class="stat">
              <div id="city-tax-payer" class="num">-</div>
              <div class="lbl">НХАТ төлөгч</div>
            </article>
            <article class="stat">
              <div id="taxpayer-found" class="num">-</div>
              <div class="lbl">Олдсон эсэх</div>
            </article>
          </div>

          <div class="details-list">
            <div class="detail-row">
              <span>НӨАТ төлөгч болсон огноо</span>
              <strong id="vat-registered-date">-</strong>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
